<!DOCTYPE html>
<html>
  <head>
    <title>PRACTICE BROWDIE</title>
    <body>
      <style>
        .Request-button{
          background-color: black;
          color: white;
          height: 35px;
          width: 50;
          font-size: 12px;
          cursor: pointer;
        }
        .Request-button:hover{
          opacity: 0.7;
          
        }

        .Add-to-Cart-button{
          background-color: rgb(255, 216, 20);
          color: black;
          height: 40px;
          width: 200px;
          border: none;
          border-radius: 16px;
          cursor: pointer;
        }
        .Add-to-Cart-button:hover{
          background-color: yellow;
        }

        .Sign-up-button {
          background-color: rgb(46, 164, 79);
          color: white;
          border: none;
          font-weight: bold;
          height: 40px;
          width: 90px;
          border-radius: 15px;
          cursor: pointer;
          transition: box-shadow 0.15s;
        }
        .Sign-up-button:hover{
          box-shadow: 10px 10px 10px rgb(0, 0, 0,0.15);
        }

        .Get-started-button{
          background-color: rgb(121, 82, 179);
          color: white;
          border: none;
          font-weight: bold;
          height: 40px;
          width: 120px;
          border-radius: 8px;
          cursor: pointer;
          margin-right: 8px;
        }
        .Get-started-button:hover{
          background-color: darkblue;
        }
        .Download-button{
          background-color: white;
          color: black;
          height: 40px;
          width: 120px;
          border-radius: 8px;
          cursor: pointer;
        }

        .Download-button:hover{
          background-color: black;
          color: white;
        }

        .Apply-button {
          background-color: rgb(10, 102, 194);
          border: none;
          color: white;
          font-weight: bold;
          height: 35px;
          width: 270px;
          border-radius: 15px;
          margin-right: 8px;
          cursor: pointer;
        }
        .Apply-button:hover{
        box-shadow: inset 0 0px 20px  rgba(17, 12, 186, 0.783);
      
        
        }

        .Save-button{
          background-color: white;
          color: rgb(10, 102, 194);
          font-weight: bold;
          height: 35px;
          width: 80px;
          border-color: rgb(10, 102, 194);
          border-radius: 15px;
          cursor: pointer;
          border-style: solid;
          
        }
        .Save-button:hover{
          box-shadow: inset 0px 0px 20px rgba(17, 12, 186, 0.783);
        }
      


      </style>

      <button class="Request-button">
        Request now
      </button>

      <br>
      <br>

      <button class="Add-to-Cart-button">
        Add to Cart
      </button>
      
      <br>
      <br>

      <button class="Sign-up-button">
        Sign up
      </button>

      <br>
      <br>

      <button class="Get-started-button">
        Get started
      </button>


      <button class="Download-button">
        Download
      </button>

      <br>
      <br>

      <button class="Apply-button">
        Apply on company website
      </button>

      <button class="Save-button">
        Save
      </button>








    </body>
  </head>
</html>
