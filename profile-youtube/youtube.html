<!DOCTYPE html>
<html>
  <head>
    <title>YOUTUBE.COM CLONE</title>
     <link rel="stylesheet" href="youtube.css">
    <link rel="preconnect" href="https://fonts. googleapis.com">
    <link rel="preconnect" href="https://fonts. gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?
      family=Rbboto:wght@400;500;700&display=swap"
      rel="stylesheet">

    <style>
      .p{
        font-family: Roboto, Arial;
        margin-top: 0;
        margin-bottom: 0;
      }

      .search-bar{
      display: block;
      }

      .video-preview{
        width: 300px;
        display: inline-block;
        vertical-align: top;
        margin-right: 15px;
      }

      .thumbnail-row{
        margin-bottom: 10px;
      }


      .thumbnail{
        width: 300px;
        display: block;
      }

    
      .profile-picture{
        width: 40px;
        border-radius: 50px;

      }

      

      .video-title{
        margin-top: 0;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        margin-bottom: 12px;
      }

      .video-author, .video-stats{
       font-size: 12px;
       color: rgb(96,96,96);
      }

      .video-author{
        margin-bottom: 6px;
      }
      
      .video-stats{
        margin-top: 0;
      }

      .video-info-grid{
        display: grid;
        grid-template-columns: 50px 1fr;
      }
      
  

    </style>
  </head>
  <body>
    <input class="search-bar" type="text" placeholder="Search">
    
    <div class="video-preview">
      <div class="thumbnail-row">
        <img class="thumbnail" src="/thumbnails-youtube/youtube-pic.webp">
    </div>

    <div class="video-info-grid">
      <div class="channel-picture">
        <img class="profile-picture" src="profile-youtube/channel-1.jpeg">
    </div>

      <div class="video-info">
        <p class="video-title">
            Talking Tech and AI with Google CEO Sundar Pichai!
          </p>
          
          <p class="video-author">
              Marques Brownlee
          </p>

          <p class="video-stats"> 
              3.4M views &#183; 6 months ago
        </p>
    </div>
  </div>
</div>

<!-- 2nd Vid -->     
     <div class="video-preview">
      <div class="thumbnail-row">
         <img class="thumbnail" src="/thumbnails-youtube/thumbnail-2.webp">
      </div>

      <div class="video-info-grid">
        <div class="channel-picture">
          <img class="profile-picture" src="/profile-youtube/channel-1.jpeg">
      </div>

      <div class="video-info">
         <p class="video-title">
          Try Not To Laugh Challenge #9
        </p>
        
        <p class="video-author">
            Markplier
        </p>

        <p class="video-stats"> 
            19M views &#183; 4 years ago
        </p>
      </div> 
    </div>
  </div>






  </body>
</html>
