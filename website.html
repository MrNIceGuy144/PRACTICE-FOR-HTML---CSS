<!DOCTYPE html>
<htmL>
  <head>
    <title>BUTTON WEBSITE</title>
    <body>
      <style>
          .SUBCRIBE-BUTTON {
            background-color: rgb(190, 1, 1);
            color: white;
            border: none;
            height: 30px;
            width: 105px;
            border-radius: 2px;
            cursor:  pointer;
            margin-right: 8px;
            font-weight: bold;
            transition: opacity 0.15s;
            transition: box-shadow 0.15;
            transition: backgroud-color 0.15,
            color 0.15;
          }
          
          .SUBCRIBE-BUTTON:hover {
         background-color: blue;
         box-shadow: 10px 10px 10px rgb(0, 0, 0,0.15);
          }
          .SUBCRIBE-BUTTON:active{
            opacity: 0.1;
          }
          


          .JOIN-BUTTON {
            background-color: rgb(254, 254, 254);
            color: rgb(12, 52, 196);
            border-color: rgb(106, 106, 237);
            border-style: solid;
            height: 30px;
            width: 55px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 8px;
            font-weight: bold;
            transition: opacity 0.15s;
            
          }

        .JOIN-BUTTON:hover{
          background-color: rgb(76, 113, 247);
          color: white;
          box-shadow: 10px 10px 10px rgb(0, 0, 0, 0.15);
        }
        .JOIN-BUTTON:active{
          opacity: 0.1;
        }

          .TWEET-BUTTON {
            background-color: rgb(2, 158, 255);
            border: none;
            color: white;
            height: 36px;
            width: 90px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: opacity 0.15s;
          }

          .TWEET-BUTTON:hover{
            background-color: aqua;
            box-shadow: 10px 10px 10px rgb(0, 0, 0,0.15);
          }
          .TWEET-BUTTON:active{
            opacity: 0.1;
          }

      </style>
      
      

      <a href="https://www.youtube.com/watch?v=G3e-cpL7ofc"  target="_blank">
        <button class="SUBCRIBE-BUTTON">
          SUBSCRIBE
        </button></a>
      <a href="https://www.facebook.com/wilfredo.bernabe.jr.2025/" target="_blank">
        <button class="JOIN-BUTTON">
          JOIN
        </button></a>
      <a href="https://github.com/dashboard" target="_blank">
        <button class="TWEET-BUTTON">
          Tweet
        </button></a>






    </body>
  </head>
