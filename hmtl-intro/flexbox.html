<!DOCTYPE html>
<html>
  <head>
    <title>Flex box practice</title>
  </head>
  <body style="padding-bottom: 1000px;">
    <div style="display: flex;
    flex-direction: row;">
      <div style="background-color: lightblue;">div 1</div>
      <div style="background-color: lightpink;">div 2</div>
    </div>

      <div style="display: flex;
      flex-direction: row;
      margin-top: 30px;">
        <div style="background-color: lightblue;
        width: 100px;">div 1(100px)</div>
        <div style="background-color: lightpink;
        flex: 1;">div 2</div>
      </div>

        <div style="display: flex;
          flex-direction: row;
          margin-top: 30px;">
            <div style="background-color: lightblue;
            width: 100px;">div 1(100px)</div>
            <div style="background-color: lightpink;
            flex: 1;">div 2</div>
            <div style="background-color: lightblue;
            flex: 2;">div 2</div>
        </div>

             <div style="display: flex;
          flex-direction: row;
          margin-top: 30px;
          border-width: 1px;
          border-style: solid;
          border-color: gray;
          height: 50px;"
         >
            <div style="background-color: lightblue;
            flex: 1;">div 12(100px)</div>
            <div style="background-color: lightpink;
            width: 100px;;">div 2</div>
            <div style="background-color: lightblue;
            width: 200px;;">div 2</div>
        </div>


                <div style="display: flex;
            flex-direction: row;
            margin-top: 30px;
            border-width: 1px;
            border-style: solid;
            border-color: gray;
            height: 70px;
            justify-content: space-between;">
              <div style="background-color: lightblue;
              width: 100px;">div 12(100px)</div>
              <div style="background-color: lightpink;
              width: 100px;;">div 2</div>
              <div style="background-color: lightblue;
              width: 100px;;">div 2</div>
          </div>


                <div style="display: flex;
            flex-direction: row;
            margin-top: 30px;
            border-width: 1px;
            border-style: solid;
            border-color: gray;
            height: 70px;
            justify-content: space-between;
            align-items: start;">
              <div style="background-color: lightblue;
              width: 100px;">div 1(100px)</div>
              <div style="background-color: lightpink;
              width: 100px;;">div 2</div>
              <div style="background-color: lightblue;
              width: 100px;;">div 2</div>
          </div>


                <div style="display: flex;
            flex-direction: column;
            margin-top: 30px;
            border-width: 1px;
            border-style: solid;
            border-color: gray;
            height: 70px;
            justify-content: space-between;
            align-items: start;">
              <div style="background-color: lightblue;
             width: 200px;">div 1(100px)</div>
              <div style="background-color: lightpink;
              width: 100px;;">div 2</div>
              <div style="background-color: lightblue;
              width: 100px;;">div 2</div>
          </div>


            
            


                





  </body>
</html>
